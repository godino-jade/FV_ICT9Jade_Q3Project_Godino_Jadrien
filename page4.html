<div class="container text-dark text-center">

    </div>
    <br>

    <div class="col">
      <label class="form-label fw-bold">DROP-OFF LOCATION:</label>
      <select class="form-select" id="dropoff">
        <option>Click here to choose your DROP-OFF location</option>

        <option value="2">Quezon Avenue</option>

      </select>
    </div>

    <br>
    <div class="col">
        <div class="fare-box">
          <h3>Fare:</h3>
          <h1 id="DisplayAns">₱ 0.00</h1>  
        </div>
    </div>

    <div class="row mb-3 mt-3">
        <div class="col">
            <button type="button" class="btn" onclick="calculateFare(false)">REGULAR FARE</button>
            <button type="button" class="btn" onclick="calculateFare(true)">DISCOUNTED FARE</button>
            <button type="button" class="btn" onclick="window.location.reload()">Refresh</button>
        </div>
    </div>
</div>

<script>
    function calculateFare(isDiscounted) {
      let pickup = parseFloat(document.getElementById("pickup").value); //to convert stings to numbers
      let dropoff = parseFloat(document.getElementById("dropoff").value);
      
      let basefare = 50; //minimum fare that includes first 2KM
      let perKMrate = 15; //cost per kilometer beyond 2KM
      let baseKM = 2; //distance included in the base fare

      let distance = Math.max(Math.abs(dropoff - pickup), 0); //selects first value
      let extraKM = Math.max(distance - baseKM, 0); //will calculate KM when it exceeds the base fare

      //fare calculate
      let fare = basefare + (extraKM * perKMrate); //regular rate

      //with discount
      if (isDiscounted) {
        fare = fare * 0.8; 
      }

     //display
      document.getElementById("DisplayAns").innerHTML = "₱ " + fare.toFixed(2);
    }

</script>
