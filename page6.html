<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<style>
		body {
			background-image: url('https://assets.publishing.service.gov.uk/media/5a5032c740f0b648ca1dc1bb/s960_ris-midlands.jpg');
			background-size: cover;
		}
		
		.logo {
			width: 50px;
			height: 70px;
			margin-left: 20px;
			margin-right: 30px;
			}
		
		.nav-item {
			font-family: Kumbh Sans;
			margin: 15px;
			}
		
		.navbar {
			background-color: #bab1f4;
			box-shadow: 0 6px 18px rgba(46, 4, 29, 0.597);
			}	
		
		.navbar-brand {
			margin-left: 50px;
		
		}
		
		.btn {
			background-color: #a38de6;
			font-family: Kumbh Sans;
			margin-right: 20px;
			margin-left: 10px;
			display: flex;
			align-items: center;
			justify-content: center;  
		}	
		
		.container {
			margin-top: 50px;
			margin-bottom: 50px;
			padding: 30px;
			border-radius: 10px;
			text-align: left;
			background-color: #cea3f8;
			background: rgba(212, 175, 255, 0.673);
			box-shadow: 0 6px 18px rgba(177, 129, 255, 0.853);
			font-family: Kumbh Sans;
			transition: transform 0.6s ease;
			max-width: 90%;
		}
		
		.container:hover {
			transform: scale(1.0223);
		}
		
		#create {
			background-color: #a38de6;
			font-family: Kumbh Sans;
			margin-right: 20px;
			margin-left: 10px;
		}
		
		.footer {
			padding-top: 10px;
			height: 40px;
			position: fixed;
			right: 0;
			bottom: 0;
			width: 100%;
			background-color: #bab1f4aa;
			color: #433878;
			text-align: center;
			font-family: Kumbh Sans;
			}
		
		#book{
			color: rgb(255, 255, 255);
			}
		
		#messagebox{
			display: flex;
    		justify-content: center;
		}

		#howto, #tipsreminders{
			text-align: left;
		}

		#purplebox{
			background-color: #a38de6c0;
			border-radius: 10px;
			padding: 15px;
			text-align: center;
		}

<body>
	<nav class="navbar navbar-expand-lg">
		<div class="container-fluid">
			<a class="text-center" href="index.html"><img src="Q3PROJECT_LOGO_NOTEXT.png" alt="" class="logo"></a>

					<ul class="navbar-nav me-auto">
						<li class="nav-item">
							<a class="nav-link" id="book" href="page4.html"><b>Book Now</b></a>
						</li>
					
					<a href="page2.html" class="btn">Create Account</a>
				</div>
			</div>
		</div>

	<div class="container text-dark">
		<p class ="fw-bold display-1">How can we help you?</p>

		<div class="row">
            <div class="col-sm-10">
            	<input type="search" id="query" class="form-control" placeholder="Search...">
            </div>

            <div class="col-sm-2">
				<button type="button" class="btn btn-success">🔎</button>
            </div>
        </div>
		
		<br>

		<div class="row g-5">
			<div class="col-sm-6">
				<div id="purplebox">
					<h1>How to book a ride</h1>
			
					<details ontoggle="howto()">
						<summary>Click for instructions</summary>
						
						<br>

						<div id="messagebox">
							<div id="howto"></div> 
						</div>
					</details>
				</div>
			</div>


			<div class="col-sm-6">
				<div id="purplebox">
					<h1>Passenger Tips and Reminders</h1>

					<details ontoggle="tipsreminders()">
						<summary>Click for instructions</summary>
						
						<br>

						<div id="messagebox">
							<div id="tipsreminders"></div> 
						</div>
					</details>
				</div>
			</div>
		</div>
	</div>

	<script>
	function howto(){
			document.getElementById("howto").innerHTML = 
			"<p><b>Step 1:</b> Login to your account or if you don't have one, create one</p>" + 
			"<p><b>Step 2:</b> Go to the Fare Matrix Page</p>" + 
			"<p><b>Step 3:</b> Enter your Pick-Up Location</p>" + 
			"<p><b>Step 4:</b> Enter your Drop-Off Location</p>" + 
			"<p><b>Step 5:</b> Click the Regular Fare</p>" +
			"<p><b>Step 5.1:</b> For <u>SENIOR CITIZENS,</u> <u>PWDs,</p>" +
			"<p>STUDENTS,</u> click the Discounted Fare</p>";
		}

	function tipsreminders(){
			document.getElementById("tipsreminders").innerHTML = 
			"<p><b>1:</b> Wait for exiting passengers to get out before getting on, give them space to walk out</p>" + 
			"<p><b>2:</b> Check if you have the exact fare before lining up to making long queues</p>" + 
			"<p><b>3:</b> Be mindful of your belongings and surroundings</p>" + 
			"<p><b>4:</b> When watching videos or playing music, use earphones or headset to avoid distrupting other people</p>" +
			"<p><b>4.1:</b> When using headsets/earphones, make sure the sound doesn't leak out</p>" +
			"<p><b>5:</b> Remember what station you need to stop at to avoid missing it and being late</p>";
		}
	</script>

	<div class="footer">
