<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Fugaz+One&family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap" rel="stylesheet">

    <style>

        body {
            background-image: url('https://assets.publishing.service.gov.uk/media/5a5032c740f0b648ca1dc1bb/s960_ris-midlands.jpg');
            background-size: cover;
        }

        .logo {
            width: 50px;
			height: 70px;
			margin-left: 20px;
			margin-right: 30px;
            }

        .nav-item {
            font-family: Kumbh Sans;
            margin: 15px;
            }

        .navbar {
            background-color: #bab1f4;
            box-shadow: 0 6px 18px rgba(46, 4, 29, 0.35);
        }

        .navbar-brand {
            margin-left: 50px;

        }
        
        .container {
            margin-top: 50px;
            margin-bottom: 70px;
            padding-top: 20px;
            padding-bottom: 10px;
            border-radius: 10px;
            justify-content: center;
            background-color: #cea3f8;
            background: rgba(212, 175, 255, 0.673);
            box-shadow: 0 6px 18px rgba(177, 129, 255, 0.853);
            font-family: Kumbh Sans;
            transition: transform 0.6s ease;
            width: 75%;
        }

        .container:hover {
        transform: scale(1.0223);
        }

        .btn {
        background-color: #a38de6;
        font-family: Kumbh Sans;
		margin-right: 20px;
		margin-left: 10px;
		display: flex;
		align-items: center;
		justify-content: center;  
        }

        .footer {
            padding-top: 10px;
			height: 40px;
			position: fixed;
			right: 0;
			bottom: 0;
			width: 100%;
			background-color: #bab1f4ce;
			color: #433878;
			text-align: center;
			font-family: Kumbh Sans;
        }

        #book{
            color: rgb(255, 255, 255);
        }

        #profile{
            display: block;
            margin: auto;
            padding: 100px;
        }

        label{
            font-weight: bold ;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
		<div class="container-fluid">
			<a class="text-center" href="index.html"><img src="Q3PROJECT_LOGO_NOTEXT.png" alt="" class="logo"></a>
				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
					<span class="navbar-toggler-icon"></span>
				</button>

			<div class="collapse navbar-collapse" id="mynavbar">
				<ul class="navbar-nav me-auto">
					<li class="nav-item">
						<a class="nav-link" href="index.html">Home</a>
					</li>

					<li class="nav-item">
						<a class="nav-link" href="page4.html">Fare Matrix</a>
					</li>

					<li class="nav-item">
						<a class="nav-link" href="page5.html">Schedule</a>
					</li>

					<li class="nav-item">
						<a class="nav-link" href="page6.html">Help</a>
					</li>
				</ul>   

				<div class="d-flex">
					<ul class="navbar-nav me-auto">
						<li class="nav-item">
							<a class="nav-link" id="book" href="page4.html"><b>Book Now</b></a>
						</li>
					
					<a href="page2.html" class="btn" id="create">Create Account</a>
				</div>
			</div>
		</div>
    </nav>
    
    <div class="container">
        <div class="row">
            <div class="col-sm-5" id="profile">
                <img class="rounded-circle" src ="https://static.vecteezy.com/system/resources/thumbnails/009/292/244/small/default-avatar-icon-of-social-media-user-vector.jpg">
                
                <br><br>

                <form>
                    <input type="file" class="form-control">
                    <br>
                    
                    <div class="d-grid gap-3">
                        <button type="button" class="btn btn-block" onclick="uploadpic()">Upload Photo</button>
                    </div>
                </form>
            </div>

            <div class="col-sm-7">
                <h1><b>REGISTRATION</b></h1>

                <details class="ontoggle">
                    <summary><u>Instructions:</u></summary>
                    <p id="instructions"></p>
                </details>

                <br>

                <form>
                    <label>First Name</label>
                        <input type="text" id="fname" class="form-control">
                    
                    <br>

                    <label>Last Name</label>
                        <input type="text" id="lname" class="form-control">
                    
                    <br>

                    <div class="row">
                        <div class="col-sm-2">
                            <label>Age</label>
                            <input type="number" class="form-control">
                        </div>

                        <div class="col-sm-10">
                            <label>Contact Number</label>
                            <input type="number" class="form-control">
                        </div>
                    </div>

                    <br>

                    <label>Email Address</label>
                        <input type="email" class="form-control">

                    <br>

                    <label>Enter your username</label>
                        <input type="text" class="form-control">

                    <br>

                    <label>Enter your password</label>
                        <input type="password" class="form-control">

                    <br>

                    <input type="checkbox" class="form-check-input" id="agree" name="termsconditions" value="checked">
                    <label class="form-check-label" for="agree">I accept the <b><u style="color: rgb(0, 7, 148)
                    ;">Terms of Use and Privacy Policy</u></b></label>

                    <br><br><br>

                    <div class="d-grid gap-3">
                        <a href="page3.html" class="btn btn-success btn-block"><b>CREATE ACCOUNT</b></a>
                    </div>

                    <br>

                    <div class="d-grid gap-3">
                        <button type="button" class="btn btn-danger btn-block" onclick="window.location.reload()"><b>CANCEL</b></button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function create(){
            var x = document.getElementById("fname").value;
            alert("You have successfully registered your account," + " " + x +"!"); 
          }

          document.getElementById('instructions').innerHTML = "Please fill out all required fields in the registration form with accurate information. Once completed, review your details and click <b>Submit</b> to finish your registration";

    </script>

    <div class="footer">
        <b>F. Benitez, J. Godino, Y. Valerio | 9-Jade ©2026</b>
    </div>
</body>
</html>
